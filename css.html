<style>
/* Modern CSS Reset & Vars */
:root {
  --font-family: 'Inter', system-ui, -apple-system, sans-serif;

  --text-muted: #6b7280;

  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Themes: Now dynamically injected in index.html */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-family);
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-dark);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.5s ease;
  overflow-x: hidden;
}

/* Glassmorphism Utilities */
.glass {

  border-bottom: 1px solid var(--glass-border);
}

  background: var(--glass-bg);

  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);

  box-shadow: var(--shadow-md);
}

  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */

}

/* Tabs */

}

  padding: 0.75rem;
  border: none;
  background: transparent;
  font-weight: 600;
  font-size: 1rem;

  border-radius: 8px;

}
.tab.active {
  background: var(--tab-active-bg);
  color: var(--tab-active-text);

}

/* Main */
.app-main {
  flex: 1;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* View Toggle */
.view-controls { display: flex; justify-content: flex-end; margin-bottom: 0.5rem; }
.view-toggle { display: flex; background: rgba(255,255,255,0.5); border-radius: 8px; padding: 2px; }
.toggle-btn { background: transparent; border: none; padding: 0.4rem 0.8rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 6px; transition: var(--transition); }
.toggle-btn.active { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }

/* Mobile responsive overrides */
@media (max-width: 768px) {
  .view-controls { display: none !important; }
  #view-monthly { display: none !important; }
  #view-daily { display: block !important; }
}

/* Restored Daily Scroller Styles */
.date-selector-wrapper { padding: 1rem; overflow: hidden; }
.date-selector { display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: none; }
.date-selector::-webkit-scrollbar { display: none; }
.date-card { min-width: 70px; padding: 0.75rem 0.5rem; border-radius: 12px; background: rgba(255,255,255,0.6); text-align: center; cursor: pointer; transition: var(--transition); border: 1px solid transparent; }
.date-card:hover { border-color: var(--primary); }
.date-card.active { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: var(--shadow-md); }
.date-card .day-name { font-size: 0.8rem; text-transform: uppercase; font-weight: 500; }
.date-card .day-num { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
.date-card.active .day-name, .date-card.active .day-num { color: white; }
.color-sat { color: #3498db; }
.color-sun { color: #e74c3c; }
.cal-cell.active .color-sat, .cal-cell.active .color-sun,
.date-card.active .color-sat, .date-card.active .color-sun { color: white; }

/* Monthly Calendar */
.calendar-wrapper { overflow: hidden; }
.cal-labels { display: flex; flex-direction: column; gap: 2px; width: 90%; margin-top: 2px; overflow: hidden; min-width: 0; }
.cal-event-label { font-size: 0.65rem; line-height: 1.2; background: var(--primary-light); color: var(--primary-hover); padding: 2px 4px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; width: 100%; display: block; box-sizing: border-box; }
.cal-cell.active .cal-event-label { background: rgba(255,255,255,0.25); color: white; }
.cal-more { font-size: 0.6rem; color: var(--text-muted); text-align: center; margin-top: 1px; }
.cal-cell.active .cal-more { color: rgba(255,255,255,0.8); }
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05);
}
.calendar-header h3 { margin: 0; font-weight: 700; color: var(--primary); font-size: 1.2rem; }
.calendar-grid-header {

  color: var(--text-muted); padding: 0.5rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem; gap: 4px;
}
.cal-cell {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;

}
.cal-cell:hover:not(.empty) { background: rgba(0,0,0,0.05); }
.cal-cell.empty { cursor: default; }
.cal-cell.active { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
.cal-cell.today { font-weight: 700; border: 1.5px solid var(--primary); }
.cal-cell.today.active { border-color: transparent; }
.cal-dots { display: flex; gap: 3px; margin-top: auto; margin-bottom: 4px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }
.cal-cell.active .cal-dot { background: white; }
.btn-icon {
  background: transparent; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--text-muted); padding: 0.5rem;
  border-radius: 50%; transition: var(--transition); display: flex; align-items: center;
}
.btn-icon:hover { background: rgba(0,0,0,0.05); color: var(--text-dark); }

/* Schedule List */
.room-notice {
  padding: 0.75rem 1rem;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--primary);
  border-top: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.3);
}
.section-title {
  font-size: 1.25rem;
  margin-bottom: 1rem;
  color: var(--text-dark);
  font-weight: 600;
}
.schedule-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.event-card {
  background: var(--white);
  border-radius: 12px;
  padding: 1rem;
  border-left: 6px solid var(--primary);
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  animation: slideIn 0.3s ease-out forwards;
}
.event-card:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-md);
}
.event-time { font-weight: 600; color: var(--primary); font-size: 1.1rem; margin-bottom: 0.25rem; }
.event-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
.event-meta { font-size: 0.875rem; color: var(--text-muted); display: flex; gap: 1rem; }
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.5);
  border-radius: 12px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 1.5rem;
  box-shadow: var(--shadow-lg);
  cursor: pointer;
  transition: var(--transition);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab:hover {
  transform: scale(1.1) rotate(90deg);
  background: var(--primary-hover);
}

/* Footer */
.app-footer { padding: 1rem; text-align: center; margin-top: auto; }
.btn-text { background: none; border: none; font-size: 0.875rem; cursor: pointer; text-decoration: underline; }
.text-muted { color: var(--text-muted); }

/* Modals */
.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal.hidden { display: none; }
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.3s ease-out forwards;
}
.modal-content {
  position: relative;
  width: 100%;
  max-width: 500px;
  padding: 2rem;
  z-index: 101;
  animation: slideUp 0.3s ease-out forwards;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: rgba(0,0,0,0.1);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.modal-close:hover { background: rgba(0,0,0,0.2); }
.modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--primary); }

/* Forms */
.modern-form .form-group { margin-bottom: 1.25rem; }
.row { display: flex; gap: 1rem; }
.col { flex: 1; }
label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-dark); }
input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-family: inherit;
  font-size: 1rem;
  transition: var(--transition);
  background: rgba(255,255,255,0.9);
}
input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.input-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
.btn {
  padding: 0.75rem 1.5rem;
  border-radius: 8px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  transition: var(--transition);
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-secondary { background: #e5e7eb; color: var(--text-dark); }
.btn-secondary:hover { background: #d1d5db; }
.btn-block { width: 100%; }
.mt-2 { margin-top: 0.5rem; }
.mt-4 { margin-top: 1rem; }
.text-link { color: var(--primary); text-decoration: none; display: inline-block; font-size: 0.875rem; }
.text-link:hover { text-decoration: underline; }
.form-message { margin-top: 1rem; font-size: 0.875rem; padding: 0.5rem; border-radius: 4px; display: none; }
.form-message.error { display: block; background: #fef2f2; color: #b91c1c; border-left: 4px solid #b91c1c; }
.form-message.success { display: block; background: #f0fdf4; color: #15803d; border-left: 4px solid #15803d; }
.loading-spinner { text-align: center; color: var(--primary); padding: 2rem; }

/* Animations */
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); scale: 0.95; } to { opacity: 1; transform: translateY(0); scale: 1; } }
.hidden { display: none !important; }

/* Responsive adjustments */
@media (min-width: 600px) {
  .header-inner { flex-direction: row; justify-content: space-between; align-items: center; }
  .room-tabs { width: 300px; }
}
</style>
